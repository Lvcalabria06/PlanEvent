services:
  planevent-db:
    image: postgres:16
    container_name: planevent-db
    environment:
      POSTGRES_DB: planevent
      POSTGRES_USER: planevent
      POSTGRES_PASSWORD: planevent
    ports:
      - "5432:5432"
    volumes:
      - planevent-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planevent -d planevent"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  planevent-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: planevent-app
    ports:
      - "3000:3000"
    environment:
      DB_URL: jdbc:postgresql://planevent-db:5432/planevent
      DB_USERNAME: planevent
      DB_PASSWORD: planevent
    depends_on:
      planevent-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  planevent-db-data:
