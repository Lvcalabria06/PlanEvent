# Configuração de teste: H2 em memória (substitui o PostgreSQL apenas nos testes).
spring.datasource.url=jdbc:h2:mem:planevent;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
server.port=0
