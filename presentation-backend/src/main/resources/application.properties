spring.application.name=PlanEvent

# ===== PostgreSQL (valores vêm do arquivo .env na raiz; defaults entre :) =====
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/planevent}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=3000

# Pré-requisito (uma vez), no pgAdmin conectado como postgres:
#   CREATE DATABASE planevent;
# As credenciais ficam no arquivo .env na raiz do projeto (copie de .env.example).
